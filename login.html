<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoTroca - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="body-login">

    <div class="login-container">
        <div class="login-box">
            <div class="logo">
            <span>EcoTroca</span>
            <img src="sua-logo.png" alt="Logo EcoTroca" class="logo-img">
        </div>
            <p class="login-subtitle">Entre para acompanhar os seus pontos e conquistas ecológicas</p>
            
            <form action="index.html" method="GET">
                <div class="input-group">
                    <label for="email">E-mail ou Usuário</label>
                    <input type="text" id="email" required placeholder="Digite seu e-mail">
                </div>
                
                <div class="input-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" required placeholder="Digite sua senha">
                </div>
                
                <button type="submit" class="btn-login">Entrar</button>
            </form>
            
            <p class="login-footer">Ainda não tem conta? <a href="#">Cadastre-se aqui</a></p>
        </div>
    </div>

</body>
</html>
